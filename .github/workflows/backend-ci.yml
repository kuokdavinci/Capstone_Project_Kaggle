name: Backend CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  backend-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run lint

      - name: Run deterministic tests
        run: npm run test

      - name: Build application
        run: npm run build

      - name: Verify MCP smoke flow
        run: npm run mcp:smoke
