name: AI Eval CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "server.ts"
      - "src/**"
      - "scripts/openai-flow-smoke.ts"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/ai-eval-ci.yml"
  pull_request:
    paths:
      - "server.ts"
      - "src/**"
      - "scripts/openai-flow-smoke.ts"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/ai-eval-ci.yml"

jobs:
  ai-eval:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: gpt-4.1-mini

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Skip when OPENAI_API_KEY is unavailable
        if: ${{ env.OPENAI_API_KEY == '' }}
        run: |
          echo "OPENAI_API_KEY is not configured in GitHub Actions secrets."
          echo "Skipping OpenAI-backed eval smoke."

      - name: Run OpenAI end-to-end smoke eval
        if: ${{ env.OPENAI_API_KEY != '' }}
        run: npm run openai:flow-smoke
